# Decision/triage thresholds and engine filters. All overridable.
triage:
  act_now_min_confidence: 0.70
  gather_data_max_confidence: 0.45     # below this with missing data => gather_more_data
leaps:
  min_expiration_months: 18
  stock_replacement_delta_min: 0.70    # stock-replacement leverage band
  stock_replacement_delta_max: 0.85
  reject_delta_below: 0.40             # unless tagged lottery
  min_open_interest: 500
  ideal_open_interest: 1000
  max_spread_pct: 0.08
  max_new_per_week: 40000
  reserve: 45000
  max_single_new: 35000
covered_call:
  max_delta: 0.15                      # write calls at <=0.15 delta only
  buyback_capture_low: 0.60
  buyback_capture_high: 0.70
  allow_below_basis_exit: false
  allow_leader_override: false         # refuse to surface calls on momentum leaders
momentum:
  breach_threshold: 0.0                # 12-1 excess return breach level
  conflict_rule: brake_size_engine_selection
reconciliation:
  tolerance_pct: 0.01
